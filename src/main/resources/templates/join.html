<!DOCTYPE html>

<!-- 문서 한글 사용, 타임리프 사용 -->
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입</title>


<!-- CSS 연결 -->
<link rel="stylesheet" href="/recyq/css/join.css">

<!-- 구글 폰트 연결 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Inter폰트 불러오는 코드 -->
<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap"
	rel="stylesheet">

</head>

<body>

	<div class="page">

		<!-- 상단 -->
		<div class="header">
			<div class="title">RecyQ</div>
			<img src="/recyq/img/logo.png" class="logo">
		</div>

		<!-- 로그인 박스 -->
		<div class="login-box">

			<div class="login-title">회원가입</div>

			<!-- joinProcess로 입력값 전송 -->
			<form th:action="@{/joinProcess}" method="post">
				<div class="input-group">
					<label>아이디</label> <input type="text" id="id" name="id" required>
				</div>

				<div class="input-group">
					<label>비밀번호</label> <input type="password" id="pw" name="pw"
						required>
				</div>

				<div class="input-group">
					<label>비밀번호 확인</label> <input type="password" id="pwCheck"
						name="pwCheck" required>
				</div>

				<div class="input-group">
					<label>전화번호</label> <input type="tel" id="phone" name="phone"
						required>
				</div>
				<button type="submit" class="login-btn">회원가입</button>
				<!-- button 입력시 정보 전달 -->


			</form>

		</div>

	</div>

</body>
</html>

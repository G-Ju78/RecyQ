<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#496D36">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>updateUser</title>
<link rel="stylesheet" href="/recyq/css/updateUser.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>
<div class=app-container>
<div class="page">

    <!-- 상단 -->
    <div class="header">
        <div class="title">RecyQ</div>
        <img src="/recyq/img/logo.png" class="logo">
    </div>

    <!-- 회원가입 박스 -->
    <div class="updateUser-box">

        <div class="updateUser-title">회원정보 수정</div>

   <!-- joinProcess로 입력값 전송 -->
   <form th:action="@{/updateUser}" method="post">
        <div class="input-group">
            <label>아이디</label>
            <input type="text" name="id" placeholder="변경할 아이디를 입력해주세요." required>
        </div>

        <div class="input-group">
            <label>비밀번호</label>
            <input type="password" name="pw" placeholder="변경할 비밀번호를 입력해주세요." required>
        </div>

        <div class="input-group">
            <label>비밀번호 확인</label>
            <input type="password" name="pwCheck" placeholder="변경할 비밀번호를 확인해주세요." required>
        </div>

        <div class="input-group">
            <label>전화번호</label>
            <input type="tel" name="phone" placeholder="변경할 전화번호를 입력해주세요." required>
        </div>
        <button type="submit" class="updateUser-btn">회원정보 수정</button>
      <!-- button 입력시 정보 전달 -->
      
      
   </form>
    
    </div>

</div>

</div>
</body>
</html>

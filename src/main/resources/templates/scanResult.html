<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RecyQ - 스캔 결과</title>

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/scanResult.css}">
</head>
<body>
    <div class="app-container">

        <div class="side-menu" id="sideMenu">
            <a th:href="@{/main}">홈으로</a> 
            <a th:href="@{/board}">환경보호 게시판</a> 
            <a th:href="@{/mypage}">마이페이지</a> 
            <a th:href="@{/pointList}">내 포인트</a>
            <a th:href="@{/quiz}">퀴즈 풀고 포인트 받기</a> 
            <a th:href="@{/map}">분리수거장 위치 찾기</a>
        </div>

        <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

        <header class="header">
            <img th:src="@{/img/menu-btn.png}" class="menu-btn" onclick="openMenu()">
            <div class="title">RecyQ</div>
            <img th:src="@{/img/logo.png}" class="logo">
        </header>

        <main class="result-content">

            <div class="scan-title-row">
                <img src="https://img.icons8.com/material-outlined/24/4e632c/search--v1.png">
                <span>스캔 결과</span>
            </div>

            <div class="card result-main">
                <div class="point-badge-pill" th:if="${result.rewardEligible}">
                    <img th:src="@{/img/point-coin.png}"> +
                    [[${result.earnedPoint ?: 10}]] P
                </div>

                <div class="item-circle">
                    <img th:src="${uploadedImage}" alt="스캔된 이미지">
                </div>
                <h2 th:text="${result.detectedItem}">플라스틱 류</h2>
                <button class="rescan-btn-small" onclick="location.href='/recyq/scan'">재촬영 하기</button>
            </div>


            <div class="card guide-card">
                <div class="label-badge green">수석 컨설턴트 리포트</div>
                
                <div class="guide-content" style="display: flex; flex-direction: column; gap: 15px;">
                    
                    <div>
                        <strong style="color: #2E7D32;">✅ 인식된 품목</strong><br>
                        <span th:text="${result.detectedItem}"></span>
                        <span style="font-weight:bold;" th:if="${result.itemCount != null and result.itemCount > 0}" th:text="' (' + ${result.itemCount} + '개)'"></span>
                    </div>

                    <div>
                        <strong style="color: #2E7D32;">📋 현재 상태</strong><br>
                        <span th:text="${result.statusMessage}"></span>
                    </div>

                    <div>
                        <strong style="color: #2E7D32;">💡 전문가 가이드</strong><br>
                        <span style="white-space: pre-line; display: block; margin-top: 5px;" th:text="${result.guide}"></span>
                    </div>

                    <div style="background-color: #F9FBE7; padding: 12px; border-radius: 10px;">
                        <strong style="color: #D4AF37;">💰 컨설턴트 코멘트</strong><br>
                        <span style="font-size: 16px;" th:text="${result.pointReason}"></span>
                    </div>
                    
                </div>
                
                <div class="warning-text" th:if="${result.dirty}">
                    <span>✖</span> 오염 심하면 일반쓰레기로 배출해주세요!
                </div>
            </div>


            <div class="card point-summary-card">
                <div class="label-badge light-green">오늘 적립 포인트</div>
                <div class="summary-list">
                    
                    <div class="summary-item" th:if="${result.rewardEligible}">
                        <span th:text="${result.detectedItem}">플라스틱 병</span> 
                        <span style="color:#D4AF37; font-weight:bold;" th:text="'+' + ${result.earnedPoint} + 'P'"></span>
                    </div>
                    
                    <div class="summary-item" th:unless="${result.rewardEligible}">
                        <span th:text="${result.detectedItem}">분석 지연</span> 
                        <span style="color:#999;">+0P (지급 불가)</span>
                    </div>

                </div>
            </div>
        </main>

        <nav class="nav-bar">
            <a th:href="@{/main}" class="nav-item"> 
                <img th:src="@{/img/home.png}"><span>홈</span>
            </a> 
            <a th:href="@{/scan}" class="nav-item active"> 
                <img th:src="@{/img/scan.png}"><span>스캔</span>
            </a> 
            <a th:href="@{/shop}" class="nav-item"> 
                <img th:src="@{/img/shop.png}"><span>상점</span>
            </a> 
            <a th:href="@{/mypage}" class="nav-item"> 
                <img th:src="@{/img/profile.png}"><span>마이</span>
            </a>
        </nav>
    </div>

    <script>
        // 메뉴 열기: 사이드메뉴와 배경 오버레이에 각각 'active'라는 클래스 이름을 추가하여 화면에 나타나게 합니다.
        function openMenu() {
            document.getElementById("sideMenu").classList.add("active");
            document.getElementById("menuOverlay").classList.add("active");
        }
        // 메뉴 닫기: 추가했던 'active' 클래스 이름을 지워서 다시 화면 밖으로 숨깁니다.
        function closeMenu() {
            document.getElementById("sideMenu").classList.remove("active");
            document.getElementById("menuOverlay").classList.remove("active");
        }
    </script>
</body>
</html>

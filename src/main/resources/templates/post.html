<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게시글 상세</title>

<!-- 게시글 상세 페이지 전용 CSS -->
<link rel="stylesheet" href="/recyq/css/post.css">

<!-- Inter 폰트 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
	rel="stylesheet">
</head>
<body>

	<div class="app-container">

		<!-- ========================= -->
		<!-- 사이드 메뉴 -->
		<!-- ========================= -->
		<div class="side-menu" id="sideMenu">
			<a th:href="@{/main}">홈으로</a> <a th:href="@{/board}">환경보호 게시판</a> <a
				th:href="@{/mypage}">마이페이지</a> <a th:href="@{/pointList}">내 포인트</a>
			<a th:href="@{/quiz}">퀴즈 풀고 포인트 받기</a> <a th:href="@{/map}">분리수거장
				위치 찾기</a>
		</div>

		<!-- 메뉴 열렸을 때 배경 어둡게 -->
		<div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

		<!-- ========================= -->
		<!-- 상단 헤더 -->
		<!-- ========================= -->
		<div class="header">
			<img src="/recyq/img/menu-btn.png" class="menu-btn"
				onclick="openMenu()">
			<div class="title">RecyQ</div>
			<img src="/recyq/img/logo.png" class="logo">
		</div>

		<!-- ========================= -->
		<!-- 게시글 상세 영역 -->
		<!-- ========================= -->
		<div class="post-detail-wrap">

			<!-- 게시글 제목 -->
			<div class="detail-title" th:text="${post.title}"></div>

			<!-- 작성자 / 작성일 / 조회수 -->
			<div class="post-top-row">
				<!-- 작성자 아이디 마스킹 -->
				<div class="writer-id"
					th:text="${post.user != null and post.user.id != null and #strings.length(post.user.id) > 4
                 ? #strings.substring(post.user.id, 0, #strings.length(post.user.id) - 4) + '****'
                 : '****'}"></div>

				<div class="writer-meta">
					<span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}"></span>
					· 조회 <span th:text="${post.viewCount}"></span>
				</div>
			</div>

			<!-- 게시글 내용 -->
			<div class="detail-content" th:text="${post.content}"></div>

			<!-- 첨부 이미지 -->
			<div class="detail-image-box"
				th:if="${post.imageUrl != null and !#strings.isEmpty(post.imageUrl)}">
				<img th:src="@{${post.imageUrl}}" alt="게시글 이미지" class="detail-image">
			</div>

			<!-- ========================= -->
			<!-- 좋아요 / 댓글 수 / 게시글 수정삭제 -->
			<!-- ========================= -->
			<div class="reaction-row">
			    <div class="reaction-left">
			
			        <!-- 게시글 추천 -->
			        <form th:action="@{/post/like}" method="post" class="inline-form">
			            <input type="hidden" name="boardId" th:value="${post.boardIdx}">
			            <button type="submit" class="icon-btn recommend-btn">💚</button>
			        </form>
			
			        <!-- 게시글 추천 수 -->
			        <span class="reaction-count" th:text="${post.likeCount}"></span>
			
			        <!-- 댓글 수 -->
			        <button type="button" class="icon-btn comment-btn">💬</button>
			        <span class="reaction-count" th:text="${post.replyCount}"></span>
			    </div>
			
			    <!-- 본인 게시글일 때만 수정/삭제 버튼 표시 -->
			    <div class="owner-action-row" th:if="${isOwner}">
			        <button type="button"
			                class="owner-btn edit-btn"
			                th:onclick="|location.href='@{/post/edit/{id}(id=${post.boardIdx})}'|">
			            수정
			        </button>
			
			        <form th:action="@{/post/delete}" method="post" class="owner-delete-form"
			              onsubmit="return confirm('정말 이 게시글을 삭제하시겠습니까?');">
			            <input type="hidden" name="boardId" th:value="${post.boardIdx}">
			            <button type="submit" class="owner-btn delete-btn">삭제</button>
			        </form>
			    </div>
			</div>

			<!-- ========================= -->
			<!-- 댓글 영역 -->
			<!-- ========================= -->
			<div class="comment-section">
				<div class="comment-title">
					댓글 <span th:text="${post.replyCount}"></span>개
				</div>

				<!-- 댓글 반복 출력 -->
				<div class="comment-item" th:each="comment : ${commentList}">
					<div class="comment-body">

						<!-- 댓글 상단: 작성자 / 시간 -->
						<div class="comment-top">
							<span class="comment-id"
								th:text="${comment.user != null and comment.user.id != null and #strings.length(comment.user.id) > 4
                              ? #strings.substring(comment.user.id, 0, #strings.length(comment.user.id) - 4) + '****'
                              : '****'}"></span>

							<span class="comment-time"
								th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
						</div>

						<!-- 댓글 내용 -->
						<div class="comment-text" th:text="${comment.content}"></div>

						<!-- 댓글 하단: 추천 / 삭제 -->
						<div class="comment-bottom">

							<!-- 댓글 추천 -->
							<form th:action="@{/comment/like}" method="post"
								class="inline-form">
								<input type="hidden" name="commentId"
									th:value="${comment.commentId}"> <input type="hidden"
									name="boardId" th:value="${post.boardIdx}">
								<button type="submit" class="comment-like-btn">추천</button>
							</form>

							<span th:text="${comment.likeCount}"></span>

							<!-- ========================= -->
							<!-- 본인 댓글일 때만 삭제 버튼 표시 -->
							<!-- loginUserCode 와 comment.user.userCode 비교 -->
							<!-- ========================= -->
							<form
								th:if="${loginUserCode != null and comment.user != null and comment.user.userCode == loginUserCode}"
								th:action="@{/comment/delete}" method="post"
								class="inline-form comment-delete-form"
								onsubmit="return confirm('이 댓글을 삭제하시겠습니까?');">

								<input type="hidden" name="commentId"
									th:value="${comment.commentId}"> <input type="hidden"
									name="boardId" th:value="${post.boardIdx}">

								<button type="submit" class="comment-delete-btn">삭제</button>
							</form>
						</div>
					</div>
				</div>
			</div>

			<!-- ========================= -->
			<!-- 댓글 입력 폼 -->
			<!-- ========================= -->
			<form class="comment-input-box" th:action="@{/comment/write}"
				method="post">
				<input type="hidden" name="boardId" th:value="${post.boardIdx}">
				<input type="text" name="content" placeholder="댓글을 입력하세요...">
				<button type="submit">등록</button>
			</form>

		</div>

		<!-- ========================= -->
		<!-- 하단 네비게이션 -->
		<!-- ========================= -->
		<nav class="nav-bar">
			<a th:href="@{/main}" class="nav-item"> <img
				th:src="@{/img/home.png}" alt="홈"> <span>홈</span>
			</a> <a th:href="@{/scan}" class="nav-item"> <img
				th:src="@{/img/scan.png}" alt="스캔"> <span>스캔</span>
			</a> <a th:href="@{/shop}" class="nav-item"> <img
				th:src="@{/img/shop.png}" alt="상점"> <span>상점</span>
			</a> <a th:href="@{/mypage}" class="nav-item"> <img
				th:src="@{/img/profile.png}" alt="마이페이지"> <span>마이페이지</span>
			</a>
		</nav>
	</div>

	<script>
		// 사이드 메뉴 열기
		function openMenu() {
			document.getElementById("sideMenu").classList.add("active");
			document.getElementById("menuOverlay").classList.add("active");
		}

		// 사이드 메뉴 닫기
		function closeMenu() {
			document.getElementById("sideMenu").classList.remove("active");
			document.getElementById("menuOverlay").classList.remove("active");
		}
	</script>

</body>
</html>

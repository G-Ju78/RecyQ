    <div class="background">
        <div class="frame">

            <div th:replace="~{header :: headerFragment}"></div>

            <main class="white-card">
                <div class="profile">
                    <div class="profile-img">
                        <img th:src="@{/img/profile.png}">

                    </div>
                    <a class="correct" th:href="@{/updateUser}">회원정보 수정</a>

                <div class="allpoint">
                    <div class="mypoint">
                        <img th:src="@{/img/point.png}">

                        <div class="point" th:text="${session.loginMem != null ? #numbers.formatInteger(session.loginMem.totalPoint, 0, 'COMMA') + 'P' : '0P'}"></div>
                    </div>
                    <div class="point-date">
                        <div class="point-today">
                            <p>오늘 적립한 포인트</p>

                            <div class="month-point" th:text="${monthPoint != null ? monthPoint + 'P' : '0P'}"></div>

                    </div>
                </div>
            </main>

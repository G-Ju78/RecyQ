<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#496D36">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>로그인 페이지</title>
<link rel="stylesheet" href="/recyq/css/login.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>
<div class="app-container">
<div class="page">

    <!-- 상단 -->
    <div class="header">
        <div class="title">RecyQ</div>
        <img src="/recyq/img/logo.png" class="logo">
    </div>

    <!-- 로그인 박스 -->
    <div class="login-box">

        <div class="login-title">로그인</div>

        <!-- 로그인 폼 -->
        <form th:action="@{/loginProcess}" method="post">
            <div class="input-group">
                <label>아이디</label>
                <input type="text" name="id" placeholder="아이디를 입력해주세요." required>
            </div>

            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" name="pw" placeholder="비밀번호를 입력해주세요." required>
            </div>

            <button type="submit" class="login-btn">로그인</button>
        </form>

        <a href="/recyq/join" class="go-join">회원가입 하러가기</a>

        <!-- 로그인 실패 메시지 -->
        <div th:if="${param.error}" style="color:red; margin-left:33px" >
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>

    </div>

</div>
</div>

</body>
</html>

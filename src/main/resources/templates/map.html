<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecyQ - 배출장소 전체보기</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/map.css?v=3}">
    <link rel="stylesheet" th:href="@{/css/header.css?v=9}">
    <link rel="stylesheet" th:href="@{/css/nav.css?v=9}">

    <style>
        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar { display: none !important; }
        html, body, .app-container { -ms-overflow-style: none !important; scrollbar-width: none !important; }
        
        /* [수정] 마커 클릭 시 나타나는 정보창(말풍선) 내부 스타일 */
        .info-content { 
            padding: 12px; 
            font-size: 13px; 
            line-height: 1.6; 
            /* 말풍선 너비 확보 및 자동 줄바꿈 설정 */
            min-width: 180px; 
            max-width: 250px; 
            white-space: normal; 
            word-break: keep-all;
        }
        .info-title { 
            font-weight: bold; 
            display: block; 
            margin-bottom: 5px; 
            color: #333; 
            font-size: 14px;
            border-bottom: 1px solid #eee;
            padding-bottom: 3px;
        }
        .info-items {
            display: block;
            margin-top: 5px;
            color: #4CAF50;
            font-weight: 600;
        }
        
        /* 화살표 클릭 영역 스타일 */
        .arrow { display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* 슬라이더 애니메이션 속도 조절 */
        .category-slider { transition: transform 0.4s ease-in-out; }
    </style>
</head>
<body>

<div class="app-container">
    <div th:replace="~{header :: headerFragment}"></div>

    <main>
        <section class="search-section">
            <h2 class="page-title">배출장소 전체보기</h2>
            <div class="search-bar">
                <input type="text" id="addressInput" placeholder="주소를 입력해주세요"
                       onkeypress="if(event.keyCode==13) {searchLocation();}">
                <button class="search-btn" onclick="searchLocation()">검 색</button>
            </div>

            <div class="category-wrapper">
                <div class="category-viewport">
                    <div class="category-slider" id="categorySlider">
                        <div class="category-page">
                            <div class="category-item active" onclick="filterMarkers('all', this)">
                                <div class="icon-circle all" style="background: #9e9e9e;">ALL</div>
                                <span>배출장소<br>전체보기</span>
                            </div>
                            <div class="category-item" onclick="filterMarkers('bottle', this)">
                                <div class="icon-circle bottle" style="background: #4CAF50;"><img th:src="@{/img/bottle.png}"></div>
                                <span>재활용품<br>분리배출장소</span>
                            </div>
                            <div class="category-item" onclick="filterMarkers('battery', this)">
                                <div class="icon-circle battery" style="background: #7e57c2;"><img th:src="@{/img/battery.png}"></div>
                                <span>전지<br>수거함</span>
                            </div>
                            <div class="category-item" onclick="filterMarkers('pill', this)">
                                <div class="icon-circle pill" style="background: #c0ca33;"><img th:src="@{/img/pill.png}"></div>
                                <span>폐의약품<br>수거함</span>
                            </div>
                        </div>
                        <div class="category-page">
                            <div class="category-item" onclick="filterMarkers('clothes', this)">
                                <div class="icon-circle clothes" style="background: #ff9800;"><img th:src="@{/img/clothes.png}"></div>
                                <span>의류<br>수거함</span>
                            </div>
                            <div class="category-item" onclick="filterMarkers('appliance', this)">
                                <div class="icon-circle appliance" style="background: #03a9f4;"><img th:src="@{/img/appliance.png}"></div>
                                <span>폐가전<br>수거함</span>
                            </div>
                            <div class="category-item empty"></div>
                            <div class="category-item empty"></div>
                        </div>
                    </div>
                </div>
                <div class="arrow" onclick="nextCategoryPage()">
                    <span id="slideArrow" style="color: #4A673B; font-size: 18px; font-weight: 900; padding-right: 5px;">❯</span>
                </div>
            </div>
        </section>

        <section class="map-area">
            <div class="map-filters">
                <button class="current-loc-btn" onclick="getCurrentLocation()">현 위치</button>
                <select><option>광주광역시</option></select>
                <select><option>동구</option></select>
            </div>
            <div id="map"></div>
        </section>
    </main>

    <div th:replace="~{nav :: navFragment}"></div>
</div>

<script th:src="@{https://dapi.kakao.com/v2/maps/sdk.js(appkey=${kakaoMapKey}, libraries='services', autoload='false')}"></script>

<script>
    var map;                
    var allMarkers = [];      
    var currentInfowindow = null; 
    var currentCategoryPage = 0; 

    window.onload = function() {
        if (typeof kakao !== 'undefined') {
            kakao.maps.load(function () {
                var mapContainer = document.getElementById('map');
                var mapOption = {
                    center: new kakao.maps.LatLng(35.1461, 126.9231),
                    level: 4
                };
                map = new kakao.maps.Map(mapContainer, mapOption);

                fetch('/recyq/api/locations') 
                    .then(res => res.json())
                    .then(data => {
                        displayMarkers(data); 
                    })
                    .catch(err => console.error("데이터 수신 에러:", err));

                setTimeout(function () { map.relayout(); }, 200);
            });
        }
    };

    function displayMarkers(locations) {
        locations.forEach(loc => {
            var marker = new kakao.maps.Marker({
                position: new kakao.maps.LatLng(loc.lat, loc.lon),
                map: map
            });

            marker.recycleItems = loc.items;

            // [수정] 텍스트가 겹치지 않도록 구조화된 HTML 사용
            var content = `
                <div class="info-content">
                    <span class="info-title">${loc.name}</span>
                    <div>${loc.address}</div>
                    <span class="info-items">취급항목: ${loc.items}</span>
                </div>`;

            var infowindow = new kakao.maps.InfoWindow({ content: content, removable: true });

            kakao.maps.event.addListener(marker, 'click', function() {
                if (currentInfowindow) currentInfowindow.close();
                infowindow.open(map, marker);
                currentInfowindow = infowindow;
            });

            allMarkers.push(marker);
        });
    }

    function filterMarkers(type, element) {
        if (!map) return;
        document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
        if (element && !element.classList.contains('empty')) element.classList.add('active');

        const categoryMap = {
            'all': '',
            'bottle': '재활용 장소',
            'battery': '폐건전지',
            'pill': '폐의약품',
            'clothes': '의류 수거함',
            'appliance': '폐가전'
        };

        var keyword = categoryMap[type];

        allMarkers.forEach(marker => {
            if (type === 'all' || (marker.recycleItems && marker.recycleItems.includes(keyword))) {
                marker.setMap(map);
            } else {
                marker.setMap(null);
            }
        });

        if (currentInfowindow) currentInfowindow.close();
    }

    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function (position) {
                var loc = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                map.setCenter(loc);
                map.setLevel(3);
            });
        }
    }

    function searchLocation() {
        var input = document.getElementById('addressInput').value;
        if (!input) return alert("주소를 입력해주세요.");

        var geocoder = new kakao.maps.services.Geocoder();
        geocoder.addressSearch(input, function(result, status) {
            if (status === kakao.maps.services.Status.OK) {
                var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                map.setCenter(coords);
            }
        });
    }

    function nextCategoryPage() {
        var slider = document.getElementById('categorySlider');
        var arrow = document.getElementById('slideArrow');
        
        if (currentCategoryPage === 0) {
            currentCategoryPage = 1;
            slider.style.transform = 'translateX(-50%)';
            arrow.textContent = '❮'; 
        } else {
            currentCategoryPage = 0;
            slider.style.transform = 'translateX(0)';
            arrow.textContent = '❯'; 
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- =========================================================
         [1] 기본 설정
         ========================================================= -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecyQ - 배출장소 전체보기</title>

    <!-- =========================================================
         [2] 폰트 / CSS 연결
         - header.css : 상단 헤더 스타일
         - nav.css    : 하단 네비게이션 스타일
         - map.css    : 지도 페이지 전용 스타일
         ========================================================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/map.css?v=16}">
    <link rel="stylesheet" th:href="@{/css/header.css?v=10}">
    <link rel="stylesheet" th:href="@{/css/nav.css?v=10}">

    <style>
        /* =========================================================
           [3] 스크롤바 숨김
           ========================================================= */
        ::-webkit-scrollbar { display: none !important; }
        html, body, .app-container {
            -ms-overflow-style: none !important;
            scrollbar-width: none !important;
        }

        /* =========================================================
           [4] 마커 클릭 시 뜨는 정보창 스타일
           - 텍스트 길이에 따라 박스 크기가 자연스럽게 늘어나도록 처리
           ========================================================= */
        .info-content {
            display: inline-block;
            width: max-content;
            min-width: 180px;
            max-width: 340px;
            padding: 12px 14px;
            font-size: 13px;
            line-height: 1.6;
            white-space: normal;
            word-break: keep-all;
            overflow-wrap: anywhere;
            box-sizing: border-box;
        }

        .info-title {
            display: block;
            margin-bottom: 6px;
            padding-bottom: 4px;
            font-size: 14px;
            font-weight: 700;
            color: #333;
            border-bottom: 1px solid #eee;
        }

        .info-address {
            display: block;
            color: #444;
            margin-bottom: 6px;
        }

        .info-items {
            display: block;
            color: #4CAF50;
            font-weight: 600;
            white-space: normal;
            word-break: keep-all;
            overflow-wrap: anywhere;
        }

        /* 오른쪽 슬라이드 화살표 */
        .arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* 카테고리 슬라이더 애니메이션 */
        .category-slider {
            transition: transform 0.4s ease-in-out;
        }
    </style>
</head>

<body>
<div class="app-container">

    <!-- =========================================================
         [5] 헤더 영역
         - header.html fragment 불러오기
         ========================================================= -->
    <div th:replace="~{header :: headerFragment}"></div>

    <main>
        <!-- =========================================================
             [6] 검색 + 카테고리 영역
             ========================================================= -->
        <section class="search-section">

            <!-- 페이지 제목 -->
            <h2 class="page-title">배출장소 전체보기</h2>

            <!-- =====================================================
                 [6-1] 주소 / 장소명 검색창
                 - Enter 키 또는 검색 버튼으로 searchLocation() 실행
                 - 행정구역 / 도로명주소 / 역 이름 / 건물명 검색 가능
                 ===================================================== -->
            <div class="search-bar">
                <input type="text"
                       id="addressInput"
                       placeholder="주소 또는 장소명을 입력해주세요"
                       onkeypress="if(event.keyCode==13) {searchLocation();}">
                <button class="search-btn" onclick="searchLocation()">검 색</button>
            </div>

            <!-- =====================================================
                 [7] 카테고리 슬라이더
                 ===================================================== -->
            <div class="category-wrapper">
                <div class="category-viewport">
                    <div class="category-slider" id="categorySlider">

                        <!-- 1페이지 -->
                        <div class="category-page">
                            <div class="category-item active" onclick="filterMarkers('all', this)">
                                <div class="icon-circle all" style="background: #9e9e9e;">ALL</div>
                                <span>배출장소<br>전체보기</span>
                            </div>

                            <div class="category-item" onclick="filterMarkers('bottle', this)">
                                <div class="icon-circle bottle" style="background: #4CAF50;">
                                    <img th:src="@{/img/bottle.png}" alt="bottle">
                                </div>
                                <span>재활용품<br>분리배출장소</span>
                            </div>

                            <div class="category-item" onclick="filterMarkers('battery', this)">
                                <div class="icon-circle battery" style="background: #7e57c2;">
                                    <img th:src="@{/img/battery.png}" alt="battery">
                                </div>
                                <span>전지<br>수거함</span>
                            </div>

                            <div class="category-item" onclick="filterMarkers('pill', this)">
                                <div class="icon-circle pill" style="background: #c0ca33;">
                                    <img th:src="@{/img/pill.png}" alt="pill">
                                </div>
                                <span>폐의약품<br>수거함</span>
                            </div>
                        </div>

                        <!-- 2페이지 -->
                        <div class="category-page">
                            <div class="category-item" onclick="filterMarkers('clothes', this)">
                                <div class="icon-circle clothes" style="background: #ff9800;">
                                    <img th:src="@{/img/clothes.png}" alt="clothes">
                                </div>
                                <span>의류<br>수거함</span>
                            </div>

                            <div class="category-item" onclick="filterMarkers('appliance', this)">
                                <div class="icon-circle appliance" style="background: #03a9f4;">
                                    <img th:src="@{/img/appliance.png}" alt="appliance">
                                </div>
                                <span>폐가전<br>수거함</span>
                            </div>

                            <!-- 빈 자리 정렬용 -->
                            <div class="category-item empty"></div>
                            <div class="category-item empty"></div>
                        </div>
                    </div>
                </div>

                <!-- 슬라이드 이동 화살표 -->
                <div class="arrow" onclick="nextCategoryPage()">
                    <span id="slideArrow">❯</span>
                </div>
            </div>
        </section>

        <!-- =========================================================
             [8] 지도 영역
             ========================================================= -->
        <section class="map-area">
            <div class="map-filters">
                <button class="current-loc-btn" onclick="getCurrentLocation()">현 위치</button>
                <select><option>광주광역시</option></select>
                <select><option>동구</option></select>
            </div>

            <!-- 카카오 지도가 들어갈 영역 -->
            <div id="map"></div>
        </section>
    </main>

    <!-- =========================================================
         [9] 하단 네비게이션
         ========================================================= -->
    <div th:replace="~{nav :: navFragment}"></div>
</div>

<!-- =========================================================
     [10] 카카오 지도 SDK
     - services 라이브러리가 있어야 주소검색 / 장소검색 가능
     ========================================================= -->
<script th:src="@{https://dapi.kakao.com/v2/maps/sdk.js(appkey=${kakaoMapKey}, libraries='services', autoload='false')}"></script>

<script>
/* =========================================================
   [11] 햄버거 메뉴 열기 / 닫기
   - header.html에서 호출하는 함수
   ========================================================= */
function openMenu() {
    document.getElementById("sideMenu").classList.add("active");
    document.getElementById("menuOverlay").classList.add("active");
}

function closeMenu() {
    document.getElementById("sideMenu").classList.remove("active");
    document.getElementById("menuOverlay").classList.remove("active");
}

/* =========================================================
   [12] 전역 변수
   ========================================================= */
var map;                      // 카카오 지도 객체
var allMarkers = [];          // 지도에 표시한 모든 마커 저장
var currentInfowindow = null; // 현재 열려있는 정보창 저장
var currentCategoryPage = 0;  // 카테고리 페이지 상태 (0: 첫 페이지, 1: 두 번째 페이지)

/* =========================================================
   [13] 페이지 로드 시 지도 초기화
   - 카카오맵 생성
   - 서버에서 위치 데이터 받아와 마커 표시
   ========================================================= */
window.onload = function() {
    kakao.maps.load(function () {
        map = new kakao.maps.Map(document.getElementById('map'), {
            center: new kakao.maps.LatLng(35.1461, 126.9231),
            level: 4
        });

        fetch('/recyq/api/locations')
            .then(res => res.json())
            .then(data => displayMarkers(data))
            .catch(err => console.error("데이터 수신 에러:", err));

        // 지도 렌더링 보정
        setTimeout(function () {
            map.relayout();
        }, 200);
    });
};

/* =========================================================
   [14] 마커 표시 함수
   - 서버에서 받은 위치 데이터를 지도에 마커로 표시
   - 마커 클릭 시 정보창 표시
   ========================================================= */
function displayMarkers(locations) {
    locations.forEach(loc => {
        var marker = new kakao.maps.Marker({
            position: new kakao.maps.LatLng(loc.lat, loc.lon),
            map: map
        });

        // 카테고리 필터링에 사용할 취급항목 정보 저장
        marker.recycleItems = loc.items;

        // 정보창 내용
        var content = `
            <div class="info-content">
                <span class="info-title">${loc.name}</span>
                <span class="info-address">${loc.address}</span>
                <span class="info-items">취급항목: ${loc.items}</span>
            </div>`;

        var infowindow = new kakao.maps.InfoWindow({
            content: content,
            removable: true
        });

        // 마커 클릭 시 정보창 열기
        kakao.maps.event.addListener(marker, 'click', function() {
            if (currentInfowindow) currentInfowindow.close();
            infowindow.open(map, marker);
            currentInfowindow = infowindow;
        });

        allMarkers.push(marker);
    });
}

/* =========================================================
   [15] 카테고리 필터 함수
   - 버튼 active 상태 변경
   - 선택한 카테고리에 해당하는 마커만 표시
   ========================================================= */
function filterMarkers(type, el) {
    document.querySelectorAll('.category-item').forEach(i => i.classList.remove('active'));

    if (el && !el.classList.contains('empty')) {
        el.classList.add('active');
    }

    const mapType = {
        all: '',
        bottle: '재활용',
        battery: '전지',
        pill: '의약품',
        clothes: '의류',
        appliance: '가전'
    };

    allMarkers.forEach(marker => {
        if (type === 'all' || (marker.recycleItems && marker.recycleItems.includes(mapType[type]))) {
            marker.setMap(map);
        } else {
            marker.setMap(null);
        }
    });

    if (currentInfowindow) currentInfowindow.close();
}

/* =========================================================
   [16] 현 위치 버튼
   - 브라우저 GPS 기능을 이용해 현재 위치로 이동
   ========================================================= */
function getCurrentLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            var loc = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
            map.setCenter(loc);
            map.setLevel(3);
        });
    }
}

/* =========================================================
   [17] 주소 / 장소명 검색 함수
   - 1차: 주소 검색(addressSearch)
   - 2차: 장소명 검색(keywordSearch)
   - 행정구역 / 도로명주소 / 역 이름 / 건물명 모두 대응
   ========================================================= */
function searchLocation() {
    var input = document.getElementById('addressInput').value.trim();

    if (!input) {
        alert("주소 또는 장소명을 입력해주세요.");
        return;
    }

    // 주소 검색 객체
    var geocoder = new kakao.maps.services.Geocoder();

    // 장소명(키워드) 검색 객체
    var places = new kakao.maps.services.Places();

    /* ---------------------------------------------------------
       [1차] 주소 검색
       - 예: 광산구, 북구, 동구, 광주광역시 동구, 금남로 등
       --------------------------------------------------------- */
    geocoder.addressSearch(input, function(result, status) {

        // 주소 검색 성공 시
        if (status === kakao.maps.services.Status.OK && result.length > 0) {
            var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
            map.setCenter(coords);
            map.setLevel(3);
            return;
        }

        /* -----------------------------------------------------
           [2차] 키워드(장소명) 검색
           - 예: 문화전당역, 금남로5가역, 전남대병원, 아시아문화전당
           ----------------------------------------------------- */
        places.keywordSearch(input, function(data, status) {

            // 키워드 검색 성공 시
            if (status === kakao.maps.services.Status.OK && data.length > 0) {
                var coords = new kakao.maps.LatLng(data[0].y, data[0].x);
                map.setCenter(coords);
                map.setLevel(3);
            } else {
                alert("검색 결과가 없습니다. 주소 또는 장소명을 다시 입력해주세요.");
            }
        });
    });
}

/* =========================================================
   [18] 카테고리 슬라이드 이동
   - 첫 번째 페이지 ↔ 두 번째 페이지 전환
   ========================================================= */
function nextCategoryPage() {
    var slider = document.getElementById('categorySlider');
    var arrow = document.getElementById('slideArrow');

    if (currentCategoryPage === 0) {
        slider.style.transform = 'translateX(-50%)';
        arrow.textContent = '❮';
        currentCategoryPage = 1;
    } else {
        slider.style.transform = 'translateX(0)';
        arrow.textContent = '❯';
        currentCategoryPage = 0;
    }
}
</script>

</body>
</html>

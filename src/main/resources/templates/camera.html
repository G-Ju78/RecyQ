<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecyQ - AI 스캔</title>

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/nav.css}">
    <link rel="stylesheet" th:href="@{/css/camera.css}">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <div class="page">
            
            <div th:replace="~{header :: headerFragment}"></div>

            <div class="camera-wrapper">
                <video id="camera-stream" autoplay playsinline></video>
                <div class="scan-guide"></div>
                <div class="scan-text">쓰레기를 가운데에 맞춰주세요</div>

                <div class="capture-btn-container">
                    <button class="capture-btn" id="capture-btn"></button>
                </div>
            </div>

            <canvas id="snapshot-canvas" style="display: none;"></canvas>

            <div id="loading-screen">
                <div class="spinner"></div>
                <h2>AI가 분석 중입니다...</h2>
            </div>

            <div th:replace="~{nav :: navFragment}"></div>

        </div>
    </div>

    <script>
        // --- [헤더 사이드 메뉴 작동용 스크립트] ---
        function openMenu() {
            document.getElementById("sideMenu").classList.add("active");
            document.getElementById("menuOverlay").classList.add("active");
        }
        function closeMenu() {
            document.getElementById("sideMenu").classList.remove("active");
            document.getElementById("menuOverlay").classList.remove("active");
        }

        // --- [카메라 작동 스크립트] ---
        const video = document.getElementById('camera-stream');
        const canvas = document.getElementById('snapshot-canvas');
        const captureBtn = document.getElementById('capture-btn');
        const loadingScreen = document.getElementById('loading-screen');

        // 1. 카메라 켜기
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" }, 
            audio: false 
        })
        .then(function(stream) {
            video.srcObject = stream;
        })
        .catch(function(error) {
            console.error("카메라를 켤 수 없습니다.", error);
            alert("카메라 접근 권한을 허용해주세요!");
        });

        // 2. 촬영 버튼 클릭 시
        captureBtn.addEventListener('click', function() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            loadingScreen.style.display = 'flex'; // 로딩 화면 온!

            // 3. 위치 정보 가져와서 서버로 전송
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    sendToServer(position.coords.latitude, position.coords.longitude);
                }, 
                function(error) {
                    sendToServer(35.1601, 126.8516); // 거부 시 기본 좌표
                }
            );
        });

        // 4. 컨트롤러로 폼(Form) 강제 전송
        function sendToServer(lat, lon) {
            canvas.toBlob(function(blob) {
                const file = new File([blob], "recyq_scan.jpg", { type: "image/jpeg" });

                const form = document.createElement("form");
                form.method = "POST";
                form.action = "/recyq/doScan"; 
                form.enctype = "multipart/form-data";

                const fileInput = document.createElement("input");
                fileInput.type = "file";
                fileInput.name = "file"; 
                const dataTransfer = new DataTransfer(); 
                dataTransfer.items.add(file);
                fileInput.files = dataTransfer.files;
                form.appendChild(fileInput);

                const latInput = document.createElement("input");
                latInput.type = "hidden";
                latInput.name = "lat";   
                latInput.value = lat;
                form.appendChild(latInput);

                const lonInput = document.createElement("input");
                lonInput.type = "hidden";
                lonInput.name = "lon";   
                lonInput.value = lon;
                form.appendChild(lonInput);

                document.body.appendChild(form);
                form.submit(); 

            }, 'image/jpeg', 0.9); 
        }
    </script>
</body>
</html>

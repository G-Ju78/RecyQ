<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게시글 작성</title>

<link rel="stylesheet" href="/recyq/css/write.css">
<link rel="stylesheet" th:href="@{/css/header.css?v=6}">
<link rel="stylesheet" th:href="@{/css/nav.css?v=6}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
	rel="stylesheet">
</head>

<body>

	<div class="app-container">

		<!-- 헤더 -->
		<div th:replace="~{header :: headerFragment}"></div>

		<div class="write-wrap">

			<!-- 제목 -->
			<div class="write-page-title"
				th:text="${editMode != null and editMode} ? '게시글 수정' : '게시글 작성'">
			</div>

			<!-- 폼 -->
			<form class="write-form"
				th:action="${editMode != null and editMode} ? @{/post/update} : @{/write}"
				method="post" enctype="multipart/form-data">

				<!-- 수정 모드일 때만 -->
				<input type="hidden" name="boardIdx"
					th:if="${editMode != null and editMode}"
					th:value="${postData.boardIdx}"> <input type="hidden"
					name="existingImageUrl" th:if="${editMode != null and editMode}"
					th:value="${postData.imageUrl}">

				<!-- 제목 -->
				<div class="form-group">
					<label class="form-label">제목</label> <input type="text"
						name="title" class="form-input" placeholder="제목을 입력하세요"
						th:value="${editMode != null and editMode ? postData.title : ''}"
						required>
				</div>

				<!-- 내용 -->
				<div class="form-group">
					<label class="form-label">내용</label>
					<textarea name="content" class="form-textarea"
						placeholder="내용을 입력하세요" required
						th:text="${editMode != null and editMode ? postData.content : ''}">
            </textarea>
				</div>

				<!-- 이미지 -->
				<div class="form-group">
					<label class="form-label">이미지 첨부</label>

					<!-- 기존 이미지 -->
					<div
						th:if="${editMode != null and editMode and postData != null and postData.imageUrl != null}">
						<img th:src="@{${postData.imageUrl}}"
							style="width: 100%; border-radius: 12px; margin-bottom: 10px;">
					</div>

					<label for="imageFile" class="file-upload-box"> <span
						class="file-upload-text"
						th:text="${editMode != null and editMode} ? '새 이미지 선택' : '이미지 선택'">
					</span> <span class="file-upload-desc">jpg, png 파일 업로드</span>
					</label> <input type="file" id="imageFile" name="imageFile"
						accept="image/*" class="file-input">

					<div id="fileName" class="file-name">선택된 파일 없음</div>
				</div>

				<!-- 버튼 -->
				<div class="button-row">

					<!-- 취소 -->
					<button type="button" class="cancel-btn"
						th:if="${editMode != null and editMode}"
						th:onclick="|location.href='/recyq/post/${postData.boardIdx}'|">
						취소</button>

					<button type="button" class="cancel-btn"
						th:unless="${editMode != null and editMode}"
						onclick="location.href='/recyq/board'">취소</button>

					<!-- 제출 -->
					<button type="submit" class="submit-btn"
						th:text="${editMode != null and editMode} ? '수정 완료' : '등록'">
					</button>
				</div>

			</form>
		</div>

		<!-- 네비 -->
		<div th:replace="~{nav :: navFragment}"></div>

	</div>

	<script>
		const imageFile = document.getElementById("imageFile");
		const fileName = document.getElementById("fileName");

		imageFile.addEventListener("change", function() {
			if (imageFile.files.length > 0) {
				fileName.textContent = imageFile.files[0].name;
			} else {
				fileName.textContent = "선택된 파일 없음";
			}
		});
	</script>

</body>
</html>

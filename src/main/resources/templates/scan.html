<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecyQ - 임시 스캔(업로드) 화면</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .upload-card {
            background: white; border-radius: 15px; padding: 30px 20px; margin: 50px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center;
        }
        .upload-btn {
            background: #496D36; color: white; border: none; padding: 12px 20px;
            border-radius: 8px; font-weight: bold; margin-top: 20px; width: 100%; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <img th:src="@{/img/menu-btn.png}" class="menu-btn" onclick="history.back()">
            <div class="title">RecyQ</div>
            <img th:src="@{/img/logo.png}" class="logo">
        </header>

        <main class="result-content">
            <div class="upload-card">
                <h3 style="color:#496D36; margin-bottom: 15px;">테스트용 사진 업로드</h3>
                <p style="font-size:13px; color:#666; margin-bottom: 20px;">
                    카메라 연동 전, 갤러리에서 사진을 선택하여 AI 분석을 테스트합니다.
                </p>
                
                <form th:action="@{/doScan}" method="post" enctype="multipart/form-data">
                    <input type="file" name="file" accept="image/*" required style="margin-bottom: 15px;">
                    
                    <input type="hidden" name="lat" value="35.1325">
                    <input type="hidden" name="lon" value="126.9123">
                    
                    <button type="submit" class="upload-btn">AI 분석 요청하기</button>
                </form>
            </div>
        </main>
        </div>
</body>
</html>

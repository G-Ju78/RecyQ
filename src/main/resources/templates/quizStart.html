<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RecyQ - 퀴즈 시작</title>

    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/nav.css}">
    <link rel="stylesheet" th:href="@{/css/quizStart.css}">
    <link rel="stylesheet" th:href="@{/css/quiz.css}">
</head>
<body>

    <div class="app-container">
        <div th:replace="~{header :: headerFragment}"></div>

        <div class="quiz-start-wrap">
            <div class="white-card">
                <img class="ox-img" th:src="@{/img/ox.png}" alt="OX 퀴즈 로고">
                <div class="quiz-text">하루 3문제 재활용 OX 퀴즈 풀고<br>포인트 받기!</div>
            </div>

            <a th:href="@{/quiz}" class="quiz-start-btn">퀴즈 풀기</a>
        </div>

        <div th:replace="~{nav :: navFragment}"></div>
    </div>

    <div id="quizModal" class="custom-modal-overlay">
        <div class="custom-modal">
            <h2 id="modalTitle" style="color: #2E501C;">알림 💡</h2>
            <p id="modalExplanation">여기에 안내 문구가 들어갑니다.</p>
            <button class="modal-btn" onclick="location.href='/recyq/main'">확인</button>
        </div>
    </div>

    <script th:inline="javascript">
        /* [핵심] 페이지 로드 시 서버에서 보낸 중복 체크 메시지 확인 */
        document.addEventListener("DOMContentLoaded", () => {
            // Thymeleaf 문법으로 서버의 'msg' 값을 가져옴 (오류 방지용 주석 처리 포함)
            const alertMessage = /*[[${msg}]]*/ null;
            
            // 만약 서버에서 보낸 메시지가 존재한다면 (이미 퀴즈를 푼 유저라면)
            if (alertMessage) {
                const modalExplanation = document.getElementById("modalExplanation");
                
                // 모달 텍스트에 서버 메시지 삽입
                modalExplanation.innerText = alertMessage;
                
                // 모달을 화면에 활성화(표시)
                document.getElementById("quizModal").classList.add("active");
            }
        });

        /* 메뉴 열기 기능 */
        function openMenu() {
            document.getElementById("sideMenu").classList.add("active");
            document.getElementById("menuOverlay").classList.add("active");
        }
        /* 메뉴 닫기 기능 */
        function closeMenu() {
            document.getElementById("sideMenu").classList.remove("active");
            document.getElementById("menuOverlay").classList.remove("active");
        }
    </script>
</body>
</html>

spring.application.name=RecyQ


# server 포트번호 등록
server.port = 8087


# context-path 등록
server.servlet.context-path=/recyq


# DB정보 등록
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://project-db-campus.smhrd.com:3307/campus_25IS_GA2_p3_4?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=campus_25IS_GA2_p3_4
spring.datasource.password=smhrd4


# DB문법 사용 설정
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# 테이블 생성 및 업데이트
spring.jpa.hibernate.ddl-auto=update


# 생성되는 sql구문 출력
spring.jpa.show-sql=true


# sql구문을 가독성 좋게 출력
spring.jpa.properties.hibernate.format_sql=true


# 파일 업로드 용량 제한 설정 (기본 1MB -> 15MB로 증가)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB


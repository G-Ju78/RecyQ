name: Spring Boot CI:CD

on:
  push:
    branches:
      - main 
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 1. JDK 버전을 21에서 17로 변경했습니다.
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17' # <--- 여기를 17로 수정!
          distribution: 'temurin'
          cache: maven # 빌드 속도를 위해 캐시 추가

      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 2. 파일 전송 (퍼블릭 서버로)
      - name: Copy Files to Public Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PUBLIC_HOST }}
          username: root
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          source: "target/*SNAPSHOT.jar,deploy_private.sh"
          target: "/root/app"
          strip_components: 0 

      # 3. 퍼블릭 서버에서 스크립트 실행
      - name: Execute deploy_private.sh on Public Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PUBLIC_HOST }}
          username: root
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          script: |
            chmod +x /root/app/deploy_private.sh
            /root/app/deploy_private.sh